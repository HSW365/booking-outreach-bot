- name: Commit updated leads/log data
        run: |
          git config user.name "hsw365-booking-bot"
          git config user.email "hsw365media@gmail.com"
          git add data/leads.json data/contacted_log.json
          git diff --quiet --cached || git commit -m "Booking outreach run: $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
