name: HSW365 Front Desk + Website Offer Outreach

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch: {}

jobs:
  outreach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run HSW365 offer outreach bot
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          SEND_PROVIDER: ${{ secrets.SEND_PROVIDER }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          OFFER_FROM_EMAIL: ${{ secrets.SMTP_USER }}
        run: python hsw365_offer_main.py

      - name: Commit updated leads/log data
        run: |
          git config user.name "hsw365-offer-bot"
          git config user.email "hsw365media@gmail.com"
          git add data/
          git diff --quiet --cached || git commit -m "HSW365 offer outreach run: $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
